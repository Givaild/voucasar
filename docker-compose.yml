services:
  # Banco de dados MySQL
  mysql:
    image: mysql:8.0
    container_name: voucasar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    ports:
      - "127.0.0.1:3306:3306" # Apenas localhost para segurança
    networks:
      - voucasar-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend FastAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voucasar-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - voucasar-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # Frontend Vite servido via Nginx (Produção)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voucasar-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80" # Mapeia a porta 5173 pública para a porta 80 interna do Nginx
    depends_on:
      - backend
    networks:
      - voucasar-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  voucasar-network:
    driver: bridge
