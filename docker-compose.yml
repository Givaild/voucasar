services:
  # Banco de dados MySQL
  mysql:
    image: mysql:8.0
    container_name: casebem-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - casebem-mysql-data:/var/lib/mysql
      - ./backups:/backups
    ports:
      - "127.0.0.1:3306:3306" # Apenas localhost
    networks:
      - casebem-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend FastAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casebem-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - casebem-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: casebem-frontend
    environment:
      NEXT_PUBLIC_API_URL: https://www.casebem.cauamarvila.com.br/
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - casebem-network
    restart: unless-stopped

volumes:
  mysql_data:


networks:
  integracar-network:
    driver: bridge
